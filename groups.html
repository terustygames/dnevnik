<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Группы - Электронный дневник</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/groups.css">
</head>

<body>
    <div class="overlay" id="overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Меню</h2>
            <button class="close-btn" id="closeBtn">✕</button>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Главная</span>
            </a>

            <a href="groups.html" class="nav-item active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                <span>Группы</span>
            </a>

            <a href="profile.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Профиль</span>
            </a>
        </nav>
    </aside>

    <header class="header">
        <a href="index.html" class="header-logo">
            <img src="icon_logo.png" alt="Дневник" class="logo-img">
        </a>

        <button class="header-btn menu-btn" id="menuBtn">
            <span class="hamburger-icon">
                <span></span>
                <span></span>
                <span></span>
            </span>
        </button>

        <div class="header-title">
            <h1>Группы</h1>
        </div>

        <div class="header-actions">
            <button class="header-btn notification-btn" id="notificationBtn">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                    <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
                <span class="notification-badge" id="notificationBadge">0</span>
            </button>

            <button class="header-btn profile-btn" id="profileBtn">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </button>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="groups-header">
                <h2>Мои группы</h2>
                <div class="groups-actions">
                    <button class="btn btn-secondary" id="joinGroupBtn">Войти в группу</button>
                    <button class="btn btn-primary" id="createGroupBtn">Создать группу</button>
                </div>
            </div>

            <div class="groups-list" id="groupsList">
                <!-- Группы будут загружены здесь -->
            </div>
        </div>
    </main>

    <!-- Модальное окно создания группы -->
    <div class="modal" id="createModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Создать группу</h3>
                <button class="modal-close" id="closeCreateModal">✕</button>
            </div>
            <form id="createGroupForm">
                <div class="form-group">
                    <label for="groupName">Название группы</label>
                    <input type="text" id="groupName" required placeholder="Например: ИС-21">
                </div>
                <div class="form-group">
                    <label for="groupDescription">Описание</label>
                    <textarea id="groupDescription" rows="3" placeholder="Описание группы"></textarea>
                </div>
                <div class="form-group">
                    <label for="groupCode">Код для входа (автоматически)</label>
                    <input type="text" id="groupCode" readonly>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancelCreate">Отмена</button>
                    <button type="submit" class="btn btn-primary">Создать</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Модальное окно входа в группу -->
    <div class="modal" id="joinModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Войти в группу</h3>
                <button class="modal-close" id="closeJoinModal">✕</button>
            </div>
            <form id="joinGroupForm">
                <div class="form-group">
                    <label for="joinCode">Код группы</label>
                    <input type="text" id="joinCode" required placeholder="Введите код группы">
                    <span class="error-text" id="joinError"></span>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" id="cancelJoin">Отмена</button>
                    <button type="submit" class="btn btn-primary">Войти</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer">
        <p>2025 Электронный дневник</p>
    </footer>

    <script type="module" src="js/groups.js"></script>
</body>

</html>
