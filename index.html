<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Главная - Электронный дневник</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>
    <div class="overlay" id="overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Меню</h2>
            <button class="close-btn" id="closeBtn">×</button>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Главная</span>
            </a>

            <a href="groups.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                <span>Группы</span>
            </a>

            <a href="admin.html" class="nav-item" id="adminNavItem" style="display: none;">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="3"></circle>
                    <path
                        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z">
                    </path>
                </svg>
                <span>Админ-панель</span>
            </a>

            <a href="profile.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Профиль</span>
            </a>
        </nav>
    </aside>

    <header class="header">
        <a href="index.html" class="header-logo">
            <img src="icon_logo.png" alt="Дневник" class="logo-img">
        </a>

        <button class="header-btn menu-btn" id="menuBtn">
            <span class="hamburger-icon">
                <span></span>
                <span></span>
                <span></span>
            </span>
        </button>

        <div class="header-title">
            <h1>Электронный дневник</h1>
        </div>

        <div class="header-actions">
            <button class="header-btn profile-btn" id="profileBtn">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </button>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="page-header">
                <h2>Добро пожаловать!</h2>
                <p id="currentDate"></p>
            </div>

            <div class="replacements-board">
                <div class="board-header">
                    <h3>Замены</h3>
                    <div class="header-controls">
                        <div class="date-filter">
                            <input type="date" id="replacementDate">
                        </div>
                        <button class="btn-upload" id="uploadBtn" style="display: none;">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="17 8 12 3 7 8"></polyline>
                                <line x1="12" y1="3" x2="12" y2="15"></line>
                            </svg>
                            <span>Загрузить</span>
                        </button>
                    </div>
                </div>

                <div class="replacements-list" id="replacementsList">
                    <div class="loading-state">
                        <div class="spinner"></div>
                        <p>Загрузка...</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal" id="uploadModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Загрузить изображение замен</h3>
                <button class="modal-close" id="closeUploadModal">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="uploadDate">Дата замен</label>
                    <input type="date" id="uploadDate" required>
                </div>

                <div class="form-group">
                    <label>Изображение</label>
                    <div class="upload-dropzone" id="uploadDropzone">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                            <circle cx="8.5" cy="8.5" r="1.5"></circle>
                            <polyline points="21 15 16 10 5 21"></polyline>
                        </svg>
                        <p>Нажмите или перетащите изображение</p>
                        <span class="dropzone-hint">PNG, JPG до 5MB</span>
                        <input type="file" id="imageInput" accept="image/*" hidden>
                    </div>
                    <div class="image-preview" id="imagePreview" style="display: none;">
                        <img id="previewImg" src="" alt="Preview">
                        <button class="btn-remove-image" id="removeImage">×</button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="uploadDescription">Описание (необязательно)</label>
                    <textarea id="uploadDescription" rows="2" placeholder="Например: Замены на понедельник"></textarea>
                </div>

                <div class="upload-progress" id="uploadProgress" style="display: none;">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressFill"></div>
                    </div>
                    <span class="progress-text" id="progressText">0%</span>
                </div>

                <div class="modal-actions">
                    <button class="btn btn-secondary" id="cancelUpload">Отмена</button>
                    <button class="btn btn-primary" id="confirmUpload" disabled>Загрузить</button>
                </div>
            </div>
        </div>
    </div>

    <div class="image-viewer" id="imageViewer">
        <button class="viewer-close" id="closeViewer">×</button>
        <img id="viewerImage" src="" alt="Замены">
        <div class="viewer-controls">
            <button class="viewer-btn" id="zoomIn">+</button>
            <button class="viewer-btn" id="zoomOut">-</button>
            <button class="viewer-btn" id="downloadImage">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                    <polyline points="7 10 12 15 17 10"></polyline>
                    <line x1="12" y1="15" x2="12" y2="3"></line>
                </svg>
            </button>
        </div>
    </div>

    <footer class="footer">
        <p>2026 Электронный дневник</p>
    </footer>

    <script type="module" src="js/index.js"></script>
</body>

</html>
