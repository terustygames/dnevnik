<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Группа - Электронный дневник</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/groups.css">
    <link rel="stylesheet" href="css/diary.css">
</head>

<body>
    <div class="overlay" id="overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Меню</h2>
            <button class="close-btn" id="closeBtn">✕</button>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Главная</span>
            </a>

            <a href="groups.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                <span>Группы</span>
            </a>

            <a href="profile.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Профиль</span>
            </a>
        </nav>
    </aside>

    <header class="header">
        <a href="index.html" class="header-logo">
            <img src="icon_logo.png" alt="Дневник" class="logo-img">
        </a>

        <button class="header-btn menu-btn" id="menuBtn">
            <span class="hamburger-icon">
                <span></span>
                <span></span>
                <span></span>
            </span>
        </button>

        <div class="header-title">
            <h1 id="groupTitle">Группа</h1>
        </div>

        <div class="header-actions">
            <button class="header-btn profile-btn" id="profileBtn">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </button>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <!-- Информация о группе -->
            <div class="group-header-card">
                <div class="group-header-info">
                    <h2 id="groupName">Группа</h2>
                    <p id="groupDescription"></p>
                </div>
                <div class="group-header-actions">
                    <div class="group-code-box">
                        <span>Код:</span>
                        <strong id="groupCode"></strong>
                        <button class="btn-icon" id="copyCodeBtn" title="Копировать">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                        </button>
                    </div>
                    <button class="btn btn-small btn-secondary" id="membersBtn">Участники</button>
                    <button class="btn btn-small btn-secondary" id="settingsBtn">Настройки</button>
                </div>
            </div>

            <!-- Выбор студента (для преподавателя) -->
            <div class="student-selector" id="studentSelector">
                <label>Студент:</label>
                <select id="studentSelect">
                    <!-- Список студентов -->
                </select>
            </div>

            <!-- Выбор семестра -->
            <div class="semester-selector">
                <button class="semester-btn active" data-semester="1">1-й семестр</button>
                <button class="semester-btn" data-semester="2">2-й семестр</button>
                <button class="semester-btn" data-semester="year">Итоговые</button>
            </div>

            <!-- Таблица оценок -->
            <div class="grades-wrapper">
                <table class="grades-table" id="gradesTable">
                    <thead>
                        <tr id="gradesHeader">
                            <th class="subject-col">Предмет</th>
                            <!-- Даты будут добавлены динамически -->
                            <th class="stats-col">Пропуски</th>
                            <th class="stats-col">Ср. балл</th>
                            <th class="stats-col">Итог</th>
                        </tr>
                    </thead>
                    <tbody id="gradesBody">
                        <!-- Строки будут добавлены динамически -->
                    </tbody>
                </table>
            </div>

            <!-- Подсказка -->
            <div class="grades-hint">
                <p>Кликните на ячейку для ввода оценки. Допустимые значения: 2, 3, 4, 5, Н (неявка)</p>
            </div>
        </div>
    </main>

    <!-- Модальное окно участников -->
    <div class="modal" id="membersModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Участники группы</h3>
                <button class="modal-close" id="closeMembersModal">✕</button>
            </div>
            <div class="modal-body">
                <div class="members-list" id="membersList"></div>
            </div>
        </div>
    </div>

    <!-- Модальное окно настроек -->
    <div class="modal" id="settingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Настройки группы</h3>
                <button class="modal-close" id="closeSettingsModal">✕</button>
            </div>
            <div class="modal-body">
                <div class="settings-section">
                    <h4>Предметы</h4>
                    <div class="subjects-list" id="subjectsList"></div>
                    <div class="add-subject-form">
                        <input type="text" id="newSubjectInput" placeholder="Название предмета">
                        <button class="btn btn-primary btn-small" id="addSubjectBtn">Добавить</button>
                    </div>
                </div>
                <div class="settings-section">
                    <h4>Количество колонок для оценок</h4>
                    <div class="columns-setting">
                        <input type="number" id="columnsCount" min="5" max="30" value="15">
                        <button class="btn btn-secondary btn-small" id="updateColumnsBtn">Применить</button>
                    </div>
                </div>
                <div class="settings-section danger-zone">
                    <h4>Опасная зона</h4>
                    <button class="btn btn-danger" id="leaveGroupBtn">Покинуть группу</button>
                    <button class="btn btn-danger" id="deleteGroupBtn" style="display:none;">Удалить группу</button>
                </div>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>2025 Электронный дневник</p>
    </footer>

    <script type="module" src="js/group.js"></script>
</body>

</html>
