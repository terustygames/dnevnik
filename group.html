    <style>
        /* Дополнительные стили для Excel */
        .excel-container {
            margin-top: 60px;
            height: calc(100vh - 60px);
            display: flex;
            flex-direction: column;
        }

        /* Панель с вкладками */
        .tabs-panel {
            height: 40px;
            background: #f0f0f0;
            border-bottom: 1px solid #d0d0d0;
            display: flex;
            align-items: flex-end;
            padding: 0 10px;
            gap: 2px;
        }

        .sheet-tab {
            padding: 8px 20px;
            background: #e0e0e0;
            border: 1px solid #d0d0d0;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            font-size: 14px;
            color: #333;
        }

        .sheet-tab:hover {
            background: #d8d8d8;
        }

        .sheet-tab.active {
            background: white;
            color: #217346;
            font-weight: 500;
        }

        .add-tab-btn {
            padding: 8px 12px;
            background: transparent;
            border: none;
            font-size: 18px;
            cursor: pointer;
            color: #666;
        }

        .add-tab-btn:hover {
            color: #217346;
        }

        /* Область таблицы */
        .table-area {
            flex: 1;
            background: white;
            overflow: auto;
        }

        .excel-table {
            border-collapse: collapse;
            width: 100%;
        }

        .excel-table th,
        .excel-table td {
            border: 1px solid #d0d0d0;
            padding: 8px;
            text-align: center;
        }

        .excel-table th {
            background: #f5f5f5;
            font-weight: 500;
        }

        .excel-table td {
            background: white;
        }

        .excel-table td input {
            width: 100%;
            border: none;
            padding: 4px;
            background: transparent;
        }

        .excel-table td input:focus {
            outline: 2px solid #217346;
            background: white;
        }
    </style>
</head>

    <script>
        // Простой функционал для вкладок
        document.querySelector('.add-tab-btn').addEventListener('click', function () {
            const tabsPanel = document.querySelector('.tabs-panel');
            const newTab = document.createElement('div');
            newTab.className = 'sheet-tab';
            newTab.textContent = 'Лист ' + (document.querySelectorAll('.sheet-tab').length + 1);
            tabsPanel.insertBefore(newTab, this);

            // Обработчик клика для новой вкладки
            newTab.addEventListener('click', function () {
                document.querySelectorAll('.sheet-tab').forEach(t => t.classList.remove('active'));
                this.classList.add('active');
            });
        });

        // Переключение вкладок
        document.addEventListener('click', function (e) {
            if (e.target.classList.contains('sheet-tab')) {
                document.querySelectorAll('.sheet-tab').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
            }
        });

        // Меню
        document.getElementById('menuBtn').addEventListener('click', function () {
            document.getElementById('sidebar').classList.add('active');
            document.getElementById('overlay').classList.add('active');
        });

        document.getElementById('closeBtn').addEventListener('click', function () {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        });

        document.getElementById('overlay').addEventListener('click', function () {
            document.getElementById('sidebar').classList.remove('active');
            document.getElementById('overlay').classList.remove('active');
        });
    </script>
