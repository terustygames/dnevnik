<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль - Электронный дневник</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/profile.css">
</head>

<body>
    <div class="overlay" id="overlay"></div>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <h2>Меню</h2>
            <button class="close-btn" id="closeBtn">✕</button>
        </div>
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                    <polyline points="9 22 9 12 15 12 15 22"></polyline>
                </svg>
                <span>Главная</span>
            </a>

            <a href="groups.html" class="nav-item">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
                    <circle cx="9" cy="7" r="4"></circle>
                    <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
                    <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                </svg>
                <span>Группы</span>
            </a>

            <a href="profile.html" class="nav-item active">
                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
                <span>Профиль</span>
            </a>
        </nav>
    </aside>

    <header class="header">
        <a href="index.html" class="header-logo">
            <img src="icon_logo.png" alt="Дневник" class="logo-img">
        </a>

        <button class="header-btn menu-btn" id="menuBtn">
            <span class="hamburger-icon">
                <span></span>
                <span></span>
                <span></span>
            </span>
        </button>

        <div class="header-title">
            <h1>Профиль</h1>
        </div>

        <div class="header-actions">
            <button class="header-btn profile-btn" id="profileBtn">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                    <circle cx="12" cy="7" r="4"></circle>
                </svg>
            </button>
        </div>
    </header>

    <main class="main-content">
        <div class="container">
            <div class="profile-header">
                <div class="profile-avatar">
                    <div class="avatar-placeholder" id="avatarPlaceholder">
                        <span id="avatarInitials"></span>
                    </div>
                </div>
                <div class="profile-info">
                    <h2 id="profileName"></h2>
                    <p id="profileEmail"></p>
                </div>
            </div>

            <div class="profile-section">
                <h3>Личная информация</h3>
                <form class="profile-form" id="profileForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="fullName">ФИО</label>
                            <input type="text" id="fullName" name="fullName" required>
                        </div>

                        <div class="form-group">
                            <label for="phone">Телефон</label>
                            <input type="tel" id="phone" name="phone" placeholder="+7 (999) 999-99-99">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="birthDate">Дата рождения</label>
                            <input type="date" id="birthDate" name="birthDate">
                        </div>

                        <div class="form-group">
                            <label for="address">Адрес</label>
                            <input type="text" id="address" name="address" placeholder="Город, улица, дом">
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="button" class="btn btn-secondary" id="cancelBtn">Отмена</button>
                        <button type="submit" class="btn btn-primary" id="saveBtn">Сохранить изменения</button>
                    </div>
                </form>
            </div>

            <div class="profile-section">
                <h3>Безопасность</h3>
                <div class="security-options">
                    <button class="security-btn logout-btn" id="logoutBtn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        <span>Выйти из аккаунта</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>2025 Электронный дневник</p>
    </footer>

    <script type="module" src="js/profile.js"></script>
</body>

</html>
